name: Update Vehicle Database

on:
  workflow_dispatch:        # Ручной запуск кнопкой
  repository_dispatch:      # Запуск из другого приложения
    types: [run_update]

jobs:
  run-parser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: node index.js
        env:
          MONGODB: ${{ secrets.MONGODB }}
          CARSAPI: ${{ secrets.CARSAPI }}
          MOTOAPI: ${{ secrets.MOTOAPI }}
          CARSAPI2: ${{ secrets.CARSAPI2 }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true